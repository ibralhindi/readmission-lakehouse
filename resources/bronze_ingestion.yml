# Bronze ingestion job.
# One job with a for_each task over the 14 selected FHIR resources.

resources:
  jobs:
    bronze_ingestion:
      name: bronze-ingestion

      # Job-level cluster shared by all tasks in this job. Single definition,
      # reused via job_cluster_key in each task — same DRY logic as our
      # for_each in Terraform.
      job_clusters:
        - job_cluster_key: bronze_cluster
          new_cluster:
            spark_version: 17.3.x-scala2.13
            node_type_id: Standard_D4ds_v4

            # Single node mode: no workers, driver does everything.
            # Three settings together are what Databricks recognises as
            # "single node" — there is no single boolean flag.
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

            # Required for Unity Catalog. ${workspace.current_user.userName}
            # is a bundle variable resolved at deploy time.
            data_security_mode: SINGLE_USER
            single_user_name: ${workspace.current_user.userName}

      tasks:
        - task_key: ingest_all_bronze
          # The outer task is the "loop controller". It doesn't need its own
          # cluster — the inner task references job_cluster_key and that's what
          # runs the actual work.
          for_each_task:
            # JSON-encoded array of values to iterate over. Each value becomes
            # available inside the inner task as the magic string {{input}}.
            # Order is deterministic and matches this list.
            inputs: |
              [
                "Patient",
                "Organization",
                "Practitioner",
                "Encounter",
                "Condition",
                "Procedure",
                "Observation",
                "MedicationRequest",
                "Immunization",
                "Claim",
                "AllergyIntolerance",
                "CarePlan",
                "CareTeam",
                "DocumentReference"
              ]

            # Serial execution. Two reasons:
            # 1. Single-node cluster — parallel would just contend on one VM.
            # 2. Easier log reading; one resource at a time in the run page.
            concurrency: 1

            task:
              task_key: ingest_one
              # Inner task references the same job-level cluster. All 14
              # iterations share one cluster instance — single boot, single
              # teardown. This is the key cost optimisation here.
              job_cluster_key: bronze_cluster

              python_wheel_task:
                package_name: readmission_lakehouse
                entry_point: rl-bronze-ingest
                parameters:
                  - "--resource-name"
                  - "{{input}}"

              libraries:
                # Glob pattern matches whatever version the artifact build produced.
                # The bundle uploads this to the workspace then `pip install`s it
                # on the cluster before the task runs.
                - whl: ../dist/*.whl
