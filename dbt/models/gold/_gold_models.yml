version: 2

models:
  - name: dim_date
    columns:
      - name: date_key
        data_tests: [not_null, unique]
      - name: full_date
        data_tests: [not_null, unique]

  - name: dim_patient
    columns:
      - name: patient_key
        description: "Surrogate key, unique per patient SCD2 version."
        data_tests: [not_null, unique]
      - name: patient_id
        description: "Natural key. NOT unique — repeats across SCD2 versions."
        data_tests: [not_null]
      - name: is_current
        data_tests:
          - not_null
