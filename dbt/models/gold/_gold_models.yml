version: 2

models:
  - name: dim_date
    columns:
      - name: date_key
        data_tests: [not_null, unique]
      - name: full_date
        data_tests: [not_null, unique]

  - name: dim_patient
    columns:
      - name: patient_key
        description: "Surrogate key, unique per patient SCD2 version."
        data_tests: [not_null, unique]
      - name: patient_id
        description: "Natural key. NOT unique — repeats across SCD2 versions."
        data_tests: [not_null]
      - name: is_current
        data_tests:
          - not_null

  - name: dim_provider
    columns:
      - name: provider_key
        data_tests: [not_null, unique]
      - name: practitioner_id
        data_tests: [not_null]

  - name: dim_organization
    columns:
      - name: organization_key
        data_tests: [not_null, unique]
      - name: organization_id
        data_tests: [not_null]

  - name: dim_condition
    columns:
      - name: condition_key
        data_tests: [not_null, unique]
      - name: snomed_code
        data_tests: [not_null, unique]   # one row per code — both unique here
      - name: occurrence_count
        data_tests: [not_null]

  - name: fact_encounter
    description: "One row per encounter. Central star-schema fact."
    columns:
      - name: encounter_key
        data_tests: [not_null, unique]
      - name: encounter_id
        data_tests: [not_null, unique]
      - name: patient_key
        description: "FK to dim_patient (as-of admission time)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_patient')
              field: patient_key
      - name: admission_date_key
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: organization_key
        description: "FK to dim_organization (current version)."
        data_tests:
          - relationships:
              to: ref('dim_organization')
              field: organization_key
              config: {severity: warn}

  - name: fact_readmission
    description: "One row per inpatient index admission with 30-day readmission flag."
    columns:
      - name: readmission_key
        data_tests: [not_null, unique]
      - name: index_encounter_key
        data_tests:
          - not_null
          - relationships: {to: ref('fact_encounter'), field: encounter_key}
      - name: patient_key
        data_tests:
          - not_null
          - relationships: {to: ref('dim_patient'), field: patient_key}
      - name: was_readmitted_30d
        data_tests: [not_null]
