version: 2

models:
  - name: patient
    description: "One row per patient, flattened from FHIR Patient."
    columns:
      - name: patient_id
        description: "Primary key. FHIR resource id."
        data_tests:
          - not_null
          - unique
      - name: gender
        description: "Patient gender."
        data_tests:
          - accepted_values:
              arguments:
                values: ['male', 'female', 'other', 'unknown']
                # FHIR spec allows these four; if we see others, something's wrong.
      - name: birth_date
        data_tests:
          - not_null
  - name: encounter
    description: "One row per encounter. Central fact for readmission analytics."
    columns:
      - name: encounter_id
        description: "Primary key. FHIR resource id."
        data_tests:
          - not_null
          - unique
      - name: patient_id
        description: "FK to silver.patient.patient_id."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('patient')
                field: patient_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                # FHIR Encounter status valueset
                values: ['planned', 'arrived', 'triaged', 'in-progress', 'onleave', 'finished', 'cancelled', 'entered-in-error', 'unknown']
      - name: encounter_class_code
        data_tests:
          - accepted_values:
              arguments:
                # FHIR v3 ActCode subset Synthea uses
                values: ['IMP', 'AMB', 'EMER', 'HH', 'OBSENC', 'SS', 'VR', 'PRENC']
              # config severity=warn — if Synthea adds a code we don't expect,
              # we want to know but not fail the build.
              config:
                severity: warn
      - name: start_time
        data_tests:
          - not_null
      - name: length_of_stay_hours
        data_tests:
          # Length-of-stay should be non-negative. Custom expression test.
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0 OR length_of_stay_hours IS NULL"
              config:
                severity: warn
  - name: condition
    columns:
      - name: condition_id
        data_tests: [not_null, unique]
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              arguments: {to: ref('patient'), field: patient_id}
      - name: snomed_code
        data_tests: [not_null]

  - name: procedure
    columns:
      - name: procedure_id
        data_tests: [not_null, unique]
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              arguments: {to: ref('patient'), field: patient_id}
      - name: snomed_code
        data_tests: [not_null]
  - name: organization
    columns:
      - name: organization_id
        data_tests: [not_null, unique]

  - name: practitioner
    columns:
      - name: practitioner_id
        data_tests: [not_null, unique]

  - name: observation
    columns:
      - name: observation_id
        data_tests: [not_null, unique]
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('patient')
                field: patient_id
              config: {severity: warn}   # unvalidated source — warn, don't fail

  - name: medication_request
    columns:
      - name: medication_request_id
        data_tests: [not_null, unique]
      - name: patient_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('patient')
                field: patient_id
              config: {severity: warn}
