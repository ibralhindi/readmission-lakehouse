# Output: FHIR NDJSON (Bulk Data Export format) + CSV for sanity-check
exporter.fhir.export=true
exporter.fhir.bulk_data=true
exporter.fhir.bulk_data.use_uscore_ig=true
exporter.csv.export=true
exporter.hospital.fhir.export=true
exporter.practitioner.fhir.export=true

# Reproducibility
seed=42
clinician_seed=42

# Realistic-sized cohort
generate.default_population=10000

# 10 years of clinical history
generate.timestep=604800000
exporter.years_of_history=10

# Geography: Massachusetts (Synthea default — densest provider/payer mappings)
generate.demographics.default_file=geography/demographics.csv
generate.geography.zipcodes.default_file=geography/zipcodes.csv
generate.geography.country_code=US
generate.geography.timezones.default_file=geography/timezones.csv
