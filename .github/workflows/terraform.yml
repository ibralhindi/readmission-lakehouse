name: Terraform

# CI scope: fmt + validate (config correctness). We intentionally do NOT run a
# live plan/apply here. A plan refreshes state and reads every resource —
# including the Unity Catalog objects in uc.tf — which would require the CI
# identity to hold Databricks metastore-admin privileges. We keep the CI
# identity scoped to the Azure plane and run UC plan/apply locally as an
# authorized admin. `validate` makes no provider API calls, so it needs no
# cloud credentials at all.
on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Format check (all of terraform/)
        run: terraform fmt -check -recursive ../..

      # -backend=false installs providers + modules to validate config against
      # their schemas, without configuring remote state. No Azure/Databricks
      # auth and no state read — so the Databricks provider is never asked to
      # authenticate to the workspace, which is exactly what was failing.
      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate
