# Databricks Asset Bundle config for readmission-lakehouse.
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html
#
# A bundle is a directory containing this file plus referenced resources/*.yml.
# `databricks bundle deploy` uploads the artifacts + registers the resources
# (jobs, pipelines, models) in the target workspace.

bundle:
  name: readmission-lakehouse

# Artifact builds — Databricks runs the build command then uploads the output.
# Without this, you'd need to remember to `uv build` before every deploy.
artifacts:
  python_wheel:
    type: whl
    path: .
    build: uv build --wheel

# Include resource definitions split across files for readability.
include:
  - resources/*.yml

# Targets define environment-specific overrides. We have one env (dev) for now;
# a real team would add staging/prod targets here.
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405614307158980.0.azuredatabricks.net
    # mode: development prepends "[dev <user>]" to job names and tags resources
    # with the developer's identity. Prevents accidental collisions when
    # multiple devs deploy to the same workspace.

# Grant the Airflow service principal permission to trigger runs of every job
# in this bundle. This lives here, not in the UI, because the jobs are
# bundle-owned — the workspace permission editor is locked for DAB resources
# ("Modify bundle sources and redeploy to edit this job"). Top-level CAN_RUN
# maps to "Can Manage Run" for jobs, which is what DatabricksRunNowOperator needs.
permissions:
  - level: CAN_RUN
    service_principal_name: e305daca-ddaa-4446-a3f4-5c89df23a17c
